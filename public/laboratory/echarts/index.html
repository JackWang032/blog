<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1.0,
minimum-scale=1.0,user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="css/index.css">
    <script src="js/jquery-3.4.1.min.js"></script>
    <title>Document</title>
    <script src="js/flexible.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/4.7.0/echarts.min.js"></script>
    <script src="js/china.js"></script>

</head>

<body>
    <header>
        <h1>数据可视化-echarts</h1>
        <div class="showTime"></div>
    </header>
    <div class="main">
        <div class="column">
            <div class="panel">
                <div class="panel_bar ">
                    <h2>柱形图-就业行情</h2>
                </div>
                <div class="charts left1">
                </div>
                <div class="panel_bottom"></div>
            </div>
            <div class="panel">
                <div class="panel_bar">
                    <h2>折线图-人口流动</h2>
                </div>
                <div class="charts left2">
                </div>
                <div class="panel_bottom"></div>
            </div>
            <div class="panel">
                <div class="panel_bar">
                    <h2>饼图-年龄分布</h2>
                </div>
                <div class="charts left3">
                </div>
                <div class="panel_bottom"></div>
            </div>
        </div>
        <div class="column">
            <div class="no">
                <div class="no_head">
                    <ul>
                        <li>12581</li>
                        <li>13400</li>
                    </ul>
                </div>
                <div class="no_body">
                    <ul>
                        <li>前端需求人数</li>
                        <li>市场供应人数</li>
                    </ul>
                </div>
            </div>
            <div class="map">
                <div class="map1"></div>
                <div class="map2"></div>
                <div class="map3"></div>
                <div id="chart_map">

                </div>
            </div>
        </div>
        <div class="column">
            <div class="panel">
                <div class="panel_bar">
                    <h2>柱形图-就业行业</h2>
                </div>
                <div class="charts right1">
                </div>
                <div class="panel_bottom"></div>
            </div>
            <div class="panel">
                <div class="panel_bar">
                    <h2>折线图-播放量</h2>
                </div>
                <div class="charts right2">
                </div>
                <div class="panel_bottom"></div>
            </div>
            <div class="panel">
                <div class="panel_bar">
                    <h2>饼状图-地区分布</h2>
                </div>
                <div class="charts right3">
                </div>
                <div class="panel_bottom"></div>
            </div>
        </div>

    </div>


</body>
<script src="./js/index.js"></script>

</html>
