    <script>
        function handleTapMenu() {
            var menu = document.querySelector('.menu')
            var navbox = document.querySelector('.mobile-nav-box')
            var state = menu.getAttribute('data-open')
            if (state == 'false') {
                menu.innerHTML = '&#xe601;'
                menu.setAttribute('data-open', 'true')
                navbox.style.display = "block"
            } else {
                menu.innerHTML = '&#xe60f;'
                menu.setAttribute('data-open', 'false')
                navbox.style.display = "none"
            }
        }
    </script>

    <script>
        axios.defaults.baseURL = 'http://localhost/api/'
        axios.interceptors.response.use(res => {
            return res.data
        })
        axios.get('setting').then(res => {
            setting = res.data
            var page = document.querySelector('.entry-page')
            var icon = document.querySelector('link[rel=icon]')
            page.style.backgroundImage = `url('${setting.bg}')`
            icon.setAttribute('href', setting.favicon)
        })
