<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1.0,
        minimum-scale=1.0,user-scalable=no">
    <meta name="keywords" content="个人博客,博客,学习博客,学习过程,wxh,前端学习,王雄辉个人博客,JackWang的博客,JackWang Blog">
    <meta name="describe" content="王雄辉的个人博客,记录了前端学习过程，学习并分享PHP、Node、MySQL和前端技术等WEB知识,记录生活的点点滴滴,是一个互联网从业者值得收藏的网站。">
    <link rel="icon"  type="image/x-icon">
    <script src="/lib/jquery-3.4.1.min.js"></script>
    <script src="/lib/axios.js"></script>
    <script src="/lib/vue.js"></script>
    <link rel="stylesheet" href="/home/css/base.css">
    <link rel="stylesheet" href="/home/css/home.css">
    <link rel="stylesheet" href="/layui/css/layui.css">
    <link rel="stylesheet" href="/home/css/article.css">
    <script src="/layui/layui.js"></script>
    <link rel="stylesheet" href="/home/css/resLayout.css">
    <title>文章 · JackWang Blog- 个人博客~</title>
</head>

<body >
    <div class="title_bar">
        <ul class="layui-nav">
            <div class="title_contain">
                <li class="layui-nav-item">
                    <a href="/">主页</a>
                </li>
                <li class="layui-nav-item">
                    <a href="/home/article">文章</a>
                </li>
                <li class="layui-nav-item">
                    <a href="/home/message">留言板</a>
                </li>
                <li class="layui-nav-item">
                    <a href="/home/about">个人信息</a>
                </li>
                <div class="title-contain-console">
                    <li class="layui-nav-item">
                        <a href="/admin/login">控制台<i class="layui-icon">&#xe665;</i></a>
                    </li>
                </div>
            </div>
        </ul>
    </div>
    <div id="app">
        <div class="container">
            <div class="leftbox">
                <div class="leftbox-main">
                    <div class="lb-item">
                        <div class="layui-card">
                            <div class="layui-card-header card-header">分类专栏</div>
                            <div class="layui-card-body">
                                <ul>
                                    <li class="card-selected" v-for="item in categories" :key="item._id"
                                        v-if="item.count!=0">
                                        <a :href="'/home/category?cgid='+item.cgid"
                                            style="display: block;">{{item.cgname}}
                                            <i>{{item.count}}篇</i>
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="lb-item archive">
                        <div class="layui-card">
                            <div class="layui-card-header card-header">归档</div>
                            <div class="layui-card-body">
                                <ul>
                                    <li v-for="item1 in group" :key="item1.month">

                                        <div class="archive-item">
                                            <p class="archive-title">{{item1.month}}<i>{{item1.articles.length}}篇</i>
                                            </p>
                                            <ul class="archive-content">

                                                <li class="card-selected" v-for="item2 in item1.articles">
                                                    <a :href="'/home/article?aid='+item2._id">{{item2.title}}</a>
                                                </li>

                                            </ul>
                                        </div>

                                    </li>
                                </ul>

                            </div>
                        </div>
                    </div>
                    <div class="lb-item datetime">
                        <div class="site-demo-laydate">
                            <div class="layui-inline" id="test-n1"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="main" style="background-color:#fff">
                <div class="crumbs">
                    <span class="layui-breadcrumb" lay-separator=">>">
                        <a href="/home">首页</a>
                        <a><cite>文章</cite></a>
                    </span>
                </div>
                <div class="article-list">
                    <div class="article-item" v-for="item in articles" :key="item._id">
                        <div class="article-main">
                            <div class="article-intro">
                                <a :href="'/home/article?aid='+item._id">
                                    <h1>{{item.title}}</h1>
                                </a>
                                <div class="content-wrap">
                                    <a :href="'/home/article?aid='+item._id">
                                        <p>{{item.content}}</p>
                                    </a>
                                </div>
                            </div>
                            <img :src="item.cover" alt="">
                        </div>
                        <div class="article-bottom">
                            <span>{{item.publishDate | dateFormat}}&nbsp;&nbsp;| 分类：</span>
                            <a style=" display: inline-block;"
                                :href="'/home/category?category='+item.cgid+'&page=1'">{{item.cgname}}</a>
                            <span>&nbsp;&nbsp;| 浏览量：{{item.pageviews}}</span>
                        </div>
                    </div>
                </div>
                <div class="laypage">
                    <div id="demo1"></div>
                </div>
            </div>

        </div>
    </div>
</body>
<script src="/home/js/base.js"></script>
<script src="/home/js/article-list.js"></script>
<script>
    layui.use(['laypage', 'layer'], function () {
        var laypage = layui.laypage,
            layer = layui.layer;
        var first = true;
        laypage.render({
            elem: 'demo1',
            count: vm.totalpage*10,
            curr: 1,
            jump: function (obj) {
                if (first) {
                    first = false;
                } else {
                    vm.articleQuery.pagenum=obj.curr;
                    vm.getArticles()
                }
            }
        });

    })
</script>

</html>
