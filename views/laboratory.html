<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="/home/layui/css/layui.css">
  <link rel="stylesheet" href="/home/css/global.css">
  <link rel="stylesheet" href="/home/css/article-list.css">
  <link rel="stylesheet" href="/home/css/laboratory.css">
  <meta name="keywords" content="个人博客,博客,学习博客,学习过程,wxh,前端学习,王雄辉个人博客,JackWang的博客,JackWang Blog">
  <meta name="describe" content="王雄辉的个人博客,记录了前端学习过程，学习并分享PHP、Node、MySQL和前端技术等WEB知识,记录生活的点点滴滴,是一个互联网从业者值得收藏的网站。">
  <link rel="icon"  type="image/x-icon">
  <title>实验室 JackWang's blog-个人博客~</title>
</head>
<body>
  <header>
    <ul class="layui-nav" lay-filter="">
      <li class="layui-nav-item"><a href="/">首页</a></li>
      <li class="layui-nav-item nav-wrap"> <a href="/article">文章</a>
      </li>
      <li class="layui-nav-item"><a href="/archive">归档</a></li>
      <li class="layui-nav-item   layui-this"><a href="/laboratory">实验室</a></li>
      <li class="layui-nav-item"><a href="/message">留言板</a></li>
      <li class="layui-nav-item"><a href="/about">关于</a></li>
    </ul>
  </header>
  <div class="nav-fixed"></div>
  <div class="container" id="app">
    <div class="articles">
      <ul>
        <li v-for='item in projects'>
          <a class="article-item" :href="item.address" target="_blink">
            <div class="cover">
              <img :src="item.cover" alt="">
            </div>
            <div class="article-content-box">
              <div class="article-title">
                {{item.name}}
              </div>
              <div class="article-info">
                <div class="time">{{item.time | dateFormat}}</div>
    
              </div>
            </div>
            <div class="article-content-mengban">
            </div>
            <div class="intro">
              <p class="intro-content">
                {{item.intro}}
              </p>
            </div>
          </a>
        </li>
        <li style="height: 1px;"></li>
        <li style="height: 1px;"></li>
      </ul>
    </div>
  </div>
  <script src="https://cdn.bootcdn.net/ajax/libs/layui/2.5.6/layui.all.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/vue/2.6.11/vue.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/axios/0.19.2/axios.js"></script>
  <script src="/home/js/common.js"></script>
  <script src="/home/js/laboratory.js"></script>
</body>

</html>
